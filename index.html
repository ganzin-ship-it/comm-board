<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>視線入力コミュニケーションボード</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f0f0f0; overflow: hidden; }
        #menu { display: flex; align-items: center; background: #fff; padding: 5px 10px; border-bottom: 2px solid #ccc; gap: 10px; flex-wrap: wrap; }
        .group { display: flex; align-items: center; gap: 5px; border-right: 1px solid #ddd; padding-right: 10px; }
        button { cursor: pointer; padding: 8px 12px; font-size: 14px; border-radius: 5px; border: 1px solid #999; background: #eee; }
        button:hover { background: #ddd; }
        #board { display: grid; height: calc(100vh - 60px); width: 100vw; gap: 10px; padding: 10px; box-sizing: border-box; }
        
        .layout-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
        .layout-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .layout-6 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }

        .card { position: relative; background: #fff; border: 5px solid #333; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; transition: transform 0.2s; }
        .card:hover { transform: scale(1.02); border-color: #2ecc71; z-index: 10; }
        .card img { max-width: 80%; max-height: 65%; object-fit: contain; pointer-events: none; }
        .card .label { margin-top: 10px; font-size: 2.5rem; font-weight: bold; pointer-events: none; }
        
        @keyframes blink { 50% { opacity: 0.5; } }
        body.hide-menu #board { height: 100vh; }
    </style>
</head>
<body id="body-root">

<div id="menu">
    <div class="group">
        <button onclick="changeLayout(2)">2択</button>
        <button onclick="changeLayout(4)">4択</button>
        <button onclick="changeLayout(6)">6択</button>
    </div>
    
    <div class="group">
        <select id="card-selector" style="font-size:14px; padding:5px;"></select>
        <button onclick="document.getElementById('file-input').click()">画像変更</button>
        <button id="rec-btn" onclick="handleRecord()">録音</button>
        <button onclick="editLabel()">文字変更</button>
        <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handleImage(event)">
    </div>

    <div class="group">
        <button style="background:#2ecc71; color:white;" onclick="exportData()">書出</button>
        <button style="background:#f1c40f;" onclick="importData()">読込</button>
    </div>
    <button onclick="toggleMenu()" style="background:#666; color:white;">隠す[S]</button>
    <button onclick="resetAll()" style="background:red; color:white; margin-left:auto;">初期化</button>
</div>

<div id="board" class="layout-4"></div>

<script>
    let currentLayout = 4;
    let isMouseIn = false;
    let currentAudioPlayback = null;
    let speechTimer = null;

    // ★見本用画像のURLを定義（localStorageにデータがない場合に使用）
    const sampleImgs = [
        "https://raw.githubusercontent.com/google/material-design-icons/master/png/action/check_circle/materialicons/128dp/1x/baseline_check_circle_black_128dp.png", // 1.はい（チェック）
        "https://raw.githubusercontent.com/google/material-design-icons/master/png/navigation/cancel/materialicons/128dp/1x/baseline_cancel_black_128dp.png",     // 2.いいえ（×）
        "https://raw.githubusercontent.com/google/material-design-icons/master/png/av/repeat/materialicons/128dp/1x/baseline_repeat_black_128dp.png",        // 3.もっと（リピート）
        "https://raw.githubusercontent.com/google/material-design-icons/master/png/action/block/materialicons/128dp/1x/baseline_block_black_128dp.png",         // 4.おわり（禁止・ストップ）
        "https://raw.githubusercontent.com/google/material-design-icons/master/png/action/update/materialicons/128dp/1x/baseline_update_black_128dp.png",        // 5.まって（更新・少し待つ）
        "https://raw.githubusercontent.com/google/material-design-icons/master/png/alert/error/materialicons/128dp/1x/baseline_error_black_128dp.png"            // 6.ちがう（エラー・注意）
    ];

    const defaultLabels = ["はい", "いいえ", "もっと", "おわり", "まって", "ちがう"];
    const decideSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

    function initBoard() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        board.className = `layout-${currentLayout}`;
        const selector = document.getElementById('card-selector');
        selector.innerHTML = '';

        for (let i = 0; i < currentLayout; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.onmouseenter = () => { 
                stopAllSounds(); 
                speechTimer = setTimeout(() => { isMouseIn = true; playProcess(i, true); }, 500); 
            };
            card.onmouseleave = () => stopAllSounds();
            card.onclick = () => playDecide(i);

            const img = document.createElement('img');
            // ★修正：localStorageにない場合、sampleImgs[i]を使用
            img.src = localStorage.getItem(`img-${i}`) || sampleImgs[i] || "https://via.placeholder.com/150?text=No+Image";

            const label = document.createElement('div');
            label.className = 'label';
            label.innerText = localStorage.getItem(`label-${i}`) || defaultLabels[i];

            card.appendChild(img);
            card.appendChild(label);
            board.appendChild(card);

            const opt = document.createElement('option');
            opt.value = i;
            opt.innerText = `カード${i+1} (${label.innerText})`;
            selector.appendChild(opt);
        }
    }

    function stopAllSounds() {
        if (speechTimer) { clearTimeout(speechTimer); speechTimer = null; }
        isMouseIn = false;
        window.speechSynthesis.cancel();
        if (currentAudioPlayback) { 
            currentAudioPlayback.pause(); 
            currentAudioPlayback.onended = null;
            currentAudioPlayback = null; 
        }
    }

    function playProcess(i, repeat = false) {
        const savedAudio = localStorage.getItem(`audio-${i}`);
        if (savedAudio) {
            if (currentAudioPlayback) { currentAudioPlayback.pause(); }
            currentAudioPlayback = new Audio(savedAudio);
            if (repeat) {
                currentAudioPlayback.onended = () => { if(isMouseIn) setTimeout(() => playProcess(i, true), 500); };
            }
            currentAudioPlayback.play().catch(e => console.log("再生エラー:", e));
        } else {
            const uttr = new SpeechSynthesisUtterance(localStorage.getItem(`label-${i}`) || defaultLabels[i]);
            if (repeat) {
                uttr.onend = () => { if(isMouseIn) setTimeout(() => playProcess(i, true), 500); };
            }
            window.speechSynthesis.speak(uttr);
        }
    }

    function playDecide(i) {
        if (speechTimer) { clearTimeout(speechTimer); speechTimer = null; }
        isMouseIn = false;
        window.speechSynthesis.cancel();
        if (currentAudioPlayback) { currentAudioPlayback.pause(); currentAudioPlayback = null; }

        decideSound.play();
        
        const card = document.querySelectorAll('.card')[i];
        card.style.animation = "blink 0.2s 3";
        setTimeout(() => card.style.animation = "", 1000);

        setTimeout(() => {
            playProcess(i, false); 
        }, 300);
    }

    // --- 設定機能 ---
    function handleImage(event) {
        const i = document.getElementById('card-selector').value;
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            localStorage.setItem(`img-${i}`, e.target.result);
            initBoard();
        };
        reader.readAsDataURL(file);
    }

    function editLabel() {
        const i = document.getElementById('card-selector').value;
        const current = localStorage.getItem(`label-${i}`) || defaultLabels[i];
        const res = prompt("ラベル名を変える", current);
        if (res) { localStorage.setItem(`label-${i}`, res); initBoard(); }
    }

    let mediaRecorder;
    let audioChunks = [];
    async function handleRecord() {
        const i = document.getElementById('card-selector').value;
        const btn = document.getElementById('rec-btn');
        
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            btn.innerText = "録音";
            btn.style.background = "";
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/ogg; codecs=opus' });
                const reader = new FileReader();
                reader.onload = (e) => {
                    localStorage.setItem(`audio-${i}`, e.target.result);
                    alert("録音しました！");
                };
                reader.readAsDataURL(blob);
            };
            mediaRecorder.start();
            btn.innerText = "停止";
            btn.style.background = "red";
        } catch (err) {
            alert("マイクの使用が許可されていないか、マイクが見つかりません。ブラウザの設定を確認してください。");
        }
    }

    function changeLayout(n) { currentLayout = n; initBoard(); }
    function toggleMenu() {
        const menu = document.getElementById('menu');
        const body = document.getElementById('body-root');
        const isHidden = menu.style.display === 'none';
        menu.style.display = isHidden ? 'flex' : 'none';
        body.classList.toggle('hide-menu', !isHidden);
    }
    function resetAll() { if (confirm("初期化しますか？")) { localStorage.clear(); location.reload(); } }
    
    function exportData() {
        const data = {};
        for (let i = 0; i < 6; i++) {
            data[`img-${i}`] = localStorage.getItem(`img-${i}`);
            data[`label-${i}`] = localStorage.getItem(`label-${i}`);
            data[`audio-${i}`] = localStorage.getItem(`audio-${i}`);
        }
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `board-setting.json`;
        a.click();
    }

    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (re) => {
                const data = JSON.parse(re.target.result);
                for (const key in data) { if (data[key]) localStorage.setItem(key, data[key]); }
                initBoard();
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }

    document.addEventListener('keydown', (e) => { if (e.key === 's' || e.key === 'S') toggleMenu(); });
    initBoard();
</script>
</body>
</html>
