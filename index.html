<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>視線入力コミュニケーションボード v53</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f0f0f0; overflow: hidden; }
        #menu { display: flex; align-items: center; background: #fff; padding: 5px 10px; border-bottom: 2px solid #ccc; gap: 10px; flex-wrap: wrap; }
        .group { display: flex; align-items: center; gap: 5px; border-right: 1px solid #ddd; padding-right: 10px; }
        button { cursor: pointer; padding: 8px 12px; font-size: 14px; border-radius: 5px; border: 1px solid #999; background: #eee; }
        button:hover { background: #ddd; }
        #board-title-display { margin-left: auto; font-weight: bold; color: #2c3e50; font-size: 1.2rem; padding-right: 15px; }
        
        #board { display: grid; height: calc(100vh - 60px); width: 100vw; gap: 15px; padding: 15px; box-sizing: border-box; }
        .layout-2 { grid-template-columns: 1fr 1fr; }
        .layout-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .layout-6 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }

        .card { 
            position: relative; background: #fff; border: 8px solid #333; border-radius: 25px; 
            display: flex; flex-direction: column; align-items: center; 
            overflow: hidden; transition: all 0.2s; cursor: pointer; 
            padding: 0; /* 余計な余白をゼロに */
        }
        .card:hover { border-color: #ff9800; background: #fffdfa; transform: scale(1.01); }

        /* 画像エリア：上半分をしっかり確保 */
        .img-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            width: 100%; min-height: 0; padding-top: 10px;
        }
        .card .emoji-img { font-size: 90px; user-select: none; }
        .card img { max-width: 90%; max-height: 90%; object-fit: contain; pointer-events: none; }
        
        /* ラベルエリア：下側に固定し、絶対に切れないように高さを確保 */
        .card .label { 
            width: 100%; height: 80px; /* 高さを固定して文字スペースを死守 */
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: bold; pointer-events: none; 
            background: rgba(255,255,255,0.8);
        }

        /* 以前のバグ対策：確定後のロック解除は維持 */
        @keyframes blink { 50% { border-color: #ffeb3b; background: #fff176; } }
    </style>
</head>
<body>
<div id="start-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:white;display:flex;justify-content:center;align-items:center;z-index:10000;">
    <button id="start-btn" onclick="activateAudio()" style="padding:50px;font-size:3rem;cursor:pointer;">スタート (v53)</button>
</div>

<div id="menu">
    <div class="group">
        <button onclick="changeLayout(2)">2択</button>
        <button onclick="changeLayout(4)">4択</button>
        <button onclick="changeLayout(6)">6択</button>
    </div>
    <div class="group">
        <select id="card-selector"></select>
        <button onclick="document.getElementById('file-input').click()">画像変更</button>
        <button id="rec-btn" onclick="handleRecord()">録音</button>
        <button onclick="editLabel()">文字変更</button>
        <button onclick="editBoardTitle()">タイトル変更</button>
        <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handleImage(event)">
    </div>
    <div class="group">
        <button onclick="exportData()">書出</button>
        <button onclick="importData()">読込</button>
    </div>
    <button onclick="toggleMenu()">隠す[S]</button>
    <div id="board-title-display"></div>
    <button onclick="resetAll()" style="color:red;">初期化</button>
</div>

<div id="board" class="layout-4"></div>

<script>
    // 基本ロジックはv52を継承（確定後のだまりこみ修正済み）
    let currentLayout = 4;
    let hoveredCardIndex = null;
    let currentAudioPlayback = null;
    let speechTimer = null;
    let isDecideLocking = false;
    let audioContext = null;

    const sampleEmojis = ["⭕", "❌", "🔄", "🛑", "⏳", "⚠️"];
    const defaultLabels = ["はい", "いいえ", "もっと", "おわり", "まって", "ちがう"];
    const decideSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

    function activateAudio() {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        audioContext.resume();
        document.getElementById('start-overlay').style.display = 'none';
    }

    function initBoard() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        board.className = `layout-${currentLayout}`;
        const selector = document.getElementById('card-selector');
        selector.innerHTML = '';
        document.getElementById('board-title-display').innerText = localStorage.getItem('board-title') || "新規ボード";

        for (let i = 0; i < currentLayout; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            
            card.onmouseenter = () => {
                if (hoveredCardIndex === i || isDecideLocking) return;
                hoveredCardIndex = i;
                stopCurrentSpeech();
                clearTimeout(speechTimer);
                speechTimer = setTimeout(() => { if (hoveredCardIndex === i) playProcess(i, true); }, 200);
            };
            card.onmouseleave = () => { hoveredCardIndex = null; clearTimeout(speechTimer); };
            card.onclick = () => playDecide(i);

            // 画像用コンテナ
            const imgCont = document.createElement('div');
            imgCont.className = 'img-container';
            const savedImg = localStorage.getItem(`img-${i}`);
            if (savedImg) {
                const img = document.createElement('img'); img.src = savedImg; imgCont.appendChild(img);
            } else {
                const emoji = document.createElement('div'); emoji.className = 'emoji-img';
                emoji.innerText = sampleEmojis[i] || "❓"; imgCont.appendChild(emoji);
            }
            
            const label = document.createElement('div');
            label.className = 'label';
            label.innerText = localStorage.getItem(`label-${i}`) || defaultLabels[i];
            
            card.appendChild(imgCont);
            card.appendChild(label);
            board.appendChild(card);

            const opt = document.createElement('option'); opt.value = i;
            opt.innerText = `カード${i+1} (${label.innerText})`;
            selector.appendChild(opt);
        }
    }

    function stopCurrentSpeech() {
        window.speechSynthesis.cancel();
        if (currentAudioPlayback) { currentAudioPlayback.pause(); currentAudioPlayback = null; }
    }

    function playProcess(i, repeat = false, isDecideMode = false) {
        if (repeat && hoveredCardIndex !== i) return;
        const finishPlay = () => {
            if (isDecideMode) { 
                isDecideLocking = false; 
                if (hoveredCardIndex !== null) playProcess(hoveredCardIndex, true);
            }
            if (hoveredCardIndex === i && repeat && !isDecideLocking) {
                speechTimer = setTimeout(() => playProcess(i, true), 600);
            }
        };
        const savedAudio = localStorage.getItem(`audio-${i}`);
        if (savedAudio) {
            currentAudioPlayback = new Audio(savedAudio);
            currentAudioPlayback.onended = finishPlay;
            currentAudioPlayback.play();
        } else {
            const uttr = new SpeechSynthesisUtterance(localStorage.getItem(`label-${i}`) || defaultLabels[i]);
            uttr.onend = finishPlay;
            window.speechSynthesis.speak(uttr);
        }
    }

    function playDecide(i) {
        if (isDecideLocking) return;
        isDecideLocking = true;
        stopCurrentSpeech();
        decideSound.play();
        const card = document.querySelectorAll('.card')[i];
        card.style.animation = "blink 0.2s 3";
        setTimeout(() => { card.style.animation = ""; playProcess(i, false, true); }, 400);
    }

    // (その他設定用関数は機能維持)
    function handleImage(e) {
        const i = document.getElementById('card-selector').value;
        const reader = new FileReader();
        reader.onload = (re) => { localStorage.setItem(`img-${i}`, re.target.result); initBoard(); };
        reader.readAsDataURL(e.target.files[0]);
    }
    function editLabel() {
        const i = document.getElementById('card-selector').value;
        const res = prompt("新しいラベル", localStorage.getItem(`label-${i}`) || defaultLabels[i]);
        if (res) { localStorage.setItem(`label-${i}`, res); localStorage.removeItem(`audio-${i}`); initBoard(); }
    }
    function changeLayout(n) { currentLayout = n; initBoard(); }
    function toggleMenu() { const m = document.getElementById('menu'); m.style.display = m.style.display === 'none' ? 'flex' : 'none'; }
    function resetAll() { if (confirm("初期化？")) { localStorage.clear(); location.reload(); } }
    
    initBoard();
</script>
</body>
</html>
