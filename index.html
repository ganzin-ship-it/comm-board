<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>視線入力コミュニケーションボード</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f0f0f0; overflow: hidden; }
        #menu { display: flex; align-items: center; background: #fff; padding: 5px 10px; border-bottom: 2px solid #ccc; gap: 10px; flex-wrap: wrap; }
        .group { display: flex; align-items: center; gap: 5px; border-right: 1px solid #ddd; padding-right: 10px; }
        button { cursor: pointer; padding: 8px 12px; font-size: 14px; border-radius: 5px; border: 1px solid #999; background: #eee; }
        button:hover { background: #ddd; }
        #board-title-display { margin-left: auto; font-weight: bold; color: #2c3e50; font-size: 1.2rem; padding-right: 15px; }
        
        #board { display: grid; height: calc(100vh - 60px); width: 100vw; gap: 10px; padding: 10px; box-sizing: border-box; }
        .layout-2 { grid-template-columns: 1fr 1fr; }
        .layout-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .layout-6 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }

        .card { position: relative; background: #fff; border: 5px solid #333; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; transition: transform 0.2s; cursor: pointer; }
        .card:hover { transform: scale(1.02); border-color: #2ecc71; z-index: 10; }
        .card .emoji-img { font-size: 120px; user-select: none; }
        .card img { max-width: 80%; max-height: 65%; object-fit: contain; pointer-events: none; }
        .card .label { margin-top: 10px; font-size: 2.5rem; font-weight: bold; pointer-events: none; }

        /* スタート画面：大きく目立つように */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        #start-btn {
            background: #ff9800; color: white; border: none; 
            padding: 50px 120px; font-size: 5rem; font-weight: bold; 
            border-radius: 100px; cursor: pointer; 
            box-shadow: 0 15px 0 #e65100; transition: all 0.1s;
        }
        #start-btn:active { transform: translateY(10px); box-shadow: 0 5px 0 #e65100; }

        @keyframes blink { 50% { opacity: 0.5; } }
        body.hide-menu #board { height: 100vh; }
    </style>
</head>
<body id="body-root">

<div id="start-overlay">
    <button id="start-btn" onclick="activateAudio()">スタート</button>
</div>

<div id="menu">
    <div class="group">
        <button onclick="changeLayout(2)">2択</button>
        <button onclick="changeLayout(4)">4択</button>
        <button onclick="changeLayout(6)">6択</button>
    </div>
    <div class="group">
        <select id="card-selector"></select>
        <button onclick="document.getElementById('file-input').click()">画像変更</button>
        <button id="rec-btn" onclick="handleRecord()">録音</button>
        <button onclick="editLabel()">文字変更</button>
        <button onclick="editBoardTitle()" style="background:#e8f4fd;">タイトル変更</button>
        <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handleImage(event)">
    </div>
    <div class="group">
        <button style="background:#2ecc71; color:white;" onclick="exportData()">書出</button>
        <button style="background:#f1c40f;" onclick="importData()">読込</button>
    </div>
    <button onclick="toggleMenu()" style="background:#666; color:white;">隠す[S]</button>
    <div id="board-title-display">新規ボード</div>
    <button onclick="resetAll()" style="background:red; color:white;">初期化</button>
</div>

<div id="board" class="layout-4"></div>

<script>
    let currentLayout = 4;
    let isMouseIn = false;
    let currentAudioPlayback = null;
    let speechTimer = null;
    let mediaRecorder;
    let audioChunks = [];
    let audioContext = null;

    const sampleEmojis = ["⭕", "❌", "🔄", "🛑", "⏳", "⚠️"];
    const defaultLabels = ["はい", "いいえ", "もっと", "おわり", "まって", "ちがう"];
    const decideSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

    function activateAudio() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        audioContext.resume();
        decideSound.play().then(() => {
            decideSound.pause();
            decideSound.currentTime = 0;
            document.getElementById('start-overlay').style.display = 'none';
        }).catch(() => {
            document.getElementById('start-overlay').style.display = 'none';
        });
    }

    function initBoard() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        board.className = `layout-${currentLayout}`;
        const selector = document.getElementById('card-selector');
        selector.innerHTML = '';
        document.getElementById('board-title-display').innerText = localStorage.getItem('board-title') || "新規ボード";

        for (let i = 0; i < currentLayout; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.onmouseenter = () => {
                stopAllSounds();
                isMouseIn = true;
                speechTimer = setTimeout(() => { playProcess(i, true); }, 500); 
            };
            card.onmouseleave = () => stopAllSounds();
            card.onclick = () => playDecide(i);

            const savedImg = localStorage.getItem(`img-${i}`);
            if (savedImg) {
                const img = document.createElement('img');
                img.src = savedImg;
                card.appendChild(img);
            } else {
                const emoji = document.createElement('div');
                emoji.className = 'emoji-img';
                emoji.innerText = sampleEmojis[i] || "❓";
                card.appendChild(emoji);
            }
            const label = document.createElement('div');
            label.className = 'label';
            label.innerText = localStorage.getItem(`label-${i}`) || defaultLabels[i];
            card.appendChild(label);
            board.appendChild(card);
            const opt = document.createElement('option');
            opt.value = i;
            opt.innerText = `カード${i+1} (${label.innerText})`;
            selector.appendChild(opt);
        }
    }

    function stopAllSounds() {
        isMouseIn = false;
        if (speechTimer) { clearTimeout(speechTimer); speechTimer = null; }
        window.speechSynthesis.cancel();
        if (currentAudioPlayback) { 
            currentAudioPlayback.pause(); 
            currentAudioPlayback.onended = null;
            currentAudioPlayback = null; 
        }
    }

    function playProcess(i, repeat = false) {
        if (repeat && !isMouseIn) return;
        const savedAudio = localStorage.getItem(`audio-${i}`);
        if (savedAudio) {
            if (currentAudioPlayback) { currentAudioPlayback.pause(); }
            currentAudioPlayback = new Audio(savedAudio);
            currentAudioPlayback.onended = () => { 
                if(isMouseIn || !repeat) setTimeout(() => { if(isMouseIn) playProcess(i, repeat); }, 600); 
            };
            currentAudioPlayback.play().catch(e => console.error(e));
        } else {
            const uttr = new SpeechSynthesisUtterance(localStorage.getItem(`label-${i}`) || defaultLabels[i]);
            uttr.onend = () => { 
                if(isMouseIn || !repeat) setTimeout(() => { if(isMouseIn) playProcess(i, repeat); }, 600); 
            };
            window.speechSynthesis.speak(uttr);
        }
    }

    function playDecide(i) {
        const wasIn = isMouseIn;
        stopAllSounds();
        decideSound.play().catch(() => {});
        const card = document.querySelectorAll('.card')[i];
        card.style.animation = "blink 0.2s 3";
        setTimeout(() => {
            card.style.animation = "";
            isMouseIn = wasIn; 
            playProcess(i, true); 
        }, 400);
    }

    function editBoardTitle() {
        const current = localStorage.getItem('board-title') || "新規ボード";
        const res = prompt("ボードのタイトルを入力してください", current);
        if (res !== null) { localStorage.setItem('board-title', res); initBoard(); }
    }

    async function handleRecord() {
        const i = document.getElementById('card-selector').value;
        const btn = document.getElementById('rec-btn');
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop(); btn.innerText = "録音"; btn.style.background = ""; return;
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    localStorage.setItem(`audio-${i}`, e.target.result);
                    initBoard(); alert("録音完了！");
                };
                reader.readAsDataURL(new Blob(audioChunks, { type: 'audio/webm' }));
            };
            mediaRecorder.start(); btn.innerText = "停止"; btn.style.background = "red";
        } catch (err) { alert("マイクを許可してください"); }
    }

    function handleImage(event) {
        const i = document.getElementById('card-selector').value;
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => { localStorage.setItem(`img-${i}`, e.target.result); initBoard(); };
        reader.readAsDataURL(file);
    }

    function editLabel() {
        const i = document.getElementById('card-selector').value;
        const res = prompt("ラベル名を変える", localStorage.getItem(`label-${i}`) || defaultLabels[i]);
        if (res) { localStorage.setItem(`label-${i}`, res); initBoard(); }
    }

    function changeLayout(n) { currentLayout = n; localStorage.setItem('current-layout', n); initBoard(); }
    function toggleMenu() {
        const menu = document.getElementById('menu');
        const isHidden = menu.style.display === 'none';
        menu.style.display = isHidden ? 'flex' : 'none';
        document.getElementById('body-root').classList.toggle('hide-menu', !isHidden);
    }
    function resetAll() { if (confirm("初期化しますか？")) { localStorage.clear(); location.reload(); } }
    
    function exportData() {
        const currentTitle = localStorage.getItem('board-title') || "board-setting";
        const fileNameToSave = prompt("保存するファイル名を入力してください", currentTitle);
        if (fileNameToSave === null) return;
        const data = { layout: currentLayout, title: fileNameToSave };
        for (let i = 0; i < 6; i++) {
            data[`img-${i}`] = localStorage.getItem(`img-${i}`);
            data[`label-${i}`] = localStorage.getItem(`label-${i}`);
            data[`audio-${i}`] = localStorage.getItem(`audio-${i}`);
        }
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], { type: 'application/json' }));
        a.download = fileNameToSave + ".json";
        a.click();
        localStorage.setItem('board-title', fileNameToSave);
        initBoard();
    }

    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (re) => {
                const data = JSON.parse(re.target.result);
                if (data.layout) { currentLayout = data.layout; localStorage.setItem('current-layout', data.layout); }
                if (data.title) localStorage.setItem('board-title', data.title);
                for (const key in data) { if (key !== 'layout' && key !== 'title' && data[key]) localStorage.setItem(key, data[key]); }
                initBoard();
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }

    document.addEventListener('keydown', (e) => { if (e.key === 's' || e.key === 'S') toggleMenu(); });
    const savedLayout = localStorage.getItem('current-layout');
    if (savedLayout) currentLayout = parseInt(savedLayout);
    initBoard();
</script>
</body>
</html>
