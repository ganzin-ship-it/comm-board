<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>視線入力コミュニケーションボード</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f0f0f0; overflow: hidden; }
        #menu { display: flex; align-items: center; background: #fff; padding: 5px 10px; border-bottom: 2px solid #ccc; gap: 10px; flex-wrap: wrap; }
        .group { display: flex; align-items: center; gap: 5px; border-right: 1px solid #ddd; padding-right: 10px; }
        button { cursor: pointer; padding: 8px 12px; font-size: 14px; border-radius: 5px; border: 1px solid #999; background: #eee; }
        button:hover { background: #ddd; }
        #board { display: grid; height: calc(100vh - 60px); width: 100vw; gap: 10px; padding: 10px; box-sizing: border-box; }
        
        .layout-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
        .layout-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .layout-6 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }

        .card { position: relative; background: #fff; border: 5px solid #333; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; transition: transform 0.2s; }
        .card:hover { transform: scale(1.02); border-color: #2ecc71; z-index: 10; }
        .card img { max-width: 80%; max-height: 65%; object-fit: contain; }
        .card .label { margin-top: 10px; font-size: 2.5rem; font-weight: bold; }
        
        @keyframes blink { 50% { opacity: 0.5; } }
        body.hide-menu #board { height: 100vh; }
    </style>
</head>
<body id="body-root">

<div id="menu">
    <div class="group">
        <button onclick="changeLayout(2)">2択</button>
        <button onclick="changeLayout(4)">4択</button>
        <button onclick="changeLayout(6)">6択</button>
    </div>
    
    <div class="group">
        <select id="card-selector" style="font-size:14px; padding:5px;"></select>
        <button onclick="document.getElementById('file-input').click()">画像変更</button>
        <button id="rec-btn" onclick="handleRecord()">録音</button>
        <button onclick="editLabel()">文字変更</button>
        <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handleImage(event)">
    </div>

    <div class="group">
        <button style="background:#2ecc71; color:white;" onclick="exportData()">書出</button>
        <button style="background:#f1c40f;" onclick="importData()">読込</button>
    </div>
    <button onclick="toggleMenu()" style="background:#666; color:white;">隠す[S]</button>
    <button onclick="resetAll()" style="background:red; color:white; margin-left:auto;">初期化</button>
</div>

<div id="board" class="layout-4"></div>

<script>
    let currentLayout = 4;
    let isMouseIn = false;
    let currentAudioPlayback = null;
    let speechTimer = null;

    // 見本用画像
    const sampleImgs = [
        "https://illustrain.com/img/work/2016/illustrain09-maru1.png", // はい
        "https://illustrain.com/img/work/2016/illustrain09-batsu1.png", // いいえ
        "https://2.bp.blogspot.com/-_oNshz7Y6U8/V9v9Y-Z_LRI/AAAAAAAA-Nc/rFv1UaV9P8s7S6W3D_D2H0_A9-U_F-f-gCLcB/s800/sweets_softcream.png", // もっと
        "https://4.bp.blogspot.com/-_C-N0EIsD_o/Wv9K_oZ_PUI/AAAAAAABMNg/KkF6-k7_Y-E_z0f6t_E7-U_P-f-gCLcB/s800/sign_owari.png" // おわり
    ];
    const defaultLabels = ["はい", "いいえ", "もっと", "おわり", "まって", "ちがう"];
    const decideSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

    function initBoard() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        board.className = `layout-${currentLayout}`;

        const selector = document.getElementById('card-selector');
        selector.innerHTML = '';

        for (let i = 0; i < currentLayout; i++) {
            // カード作成
            const card = document.createElement('div');
            card.className = 'card';
            card.onmouseenter = () => { stopAllSounds(); speechTimer = setTimeout(() => { isMouseIn = true; playProcess(i); }, 500); };
            card.onmouseleave = () => stopAllSounds();
            card.onclick = () => playDecide(i);

            const img = document.createElement('img');
            img.id = `img-${i}`;
            img.src = localStorage.getItem(`img-${i}`) || sampleImgs[i] || "https://via.placeholder.com/150?text=No+Image";

            const label = document.createElement('div');
            label.className = 'label';
            label.innerText = localStorage.getItem(`label-${i}`) || defaultLabels[i];

            card.appendChild(img);
            card.appendChild(label);
            board.appendChild(card);

            // セレクターに項目追加
            const opt = document.createElement('option');
            opt.value = i;
            opt.innerText = `カード${i+1} (${label.innerText})`;
            selector.appendChild(opt);
        }
    }

    function stopAllSounds() {
        if (speechTimer) { clearTimeout(speechTimer); speechTimer = null; }
        isMouseIn = false;
        window.speechSynthesis.cancel();
        if (currentAudioPlayback) { currentAudioPlayback.pause(); currentAudioPlayback = null; }
    }

    function playProcess(i) {
        if (!isMouseIn) return;
        const savedAudio = localStorage.getItem(`audio-${i}`);
        if (savedAudio) {
            currentAudioPlayback = new Audio(savedAudio);
            currentAudioPlayback.onended = () => { if(isMouseIn) setTimeout(() => playProcess(i), 500); };
            currentAudioPlayback.play();
        } else {
            const uttr = new SpeechSynthesisUtterance(localStorage.getItem(`label-${i}`) || defaultLabels[i]);
            uttr.onend = () => { if(isMouseIn) setTimeout(() => playProcess(i), 500); };
            window.speechSynthesis.speak(uttr);
        }
    }

    function playDecide(i) {
        stopAllSounds();
        decideSound.play();
        const card = document.querySelectorAll('.card')[i];
        card.style.animation = "blink 0.2s 3";
        setTimeout(() => card.style.animation = "", 1000);
    }

    // --- 設定機能 ---
    function handleImage(event) {
        const i = document.getElementById('card-selector').value;
        const reader = new FileReader();
        reader.onload = (e) => {
            localStorage.setItem(`img-${i}`, e.target.result);
            initBoard();
        };
        reader.readAsDataURL(event.target.files[0]);
    }

    function editLabel() {
        const i = document.getElementById('card-selector').value;
        const current = localStorage.getItem(`label-${i}`) || defaultLabels[i];
        const res = prompt("ラベル名を変える", current);
        if (res) { localStorage.setItem(`label-${i}`, res); initBoard(); }
    }

    let mediaRecorder;
    let audioChunks = [];
    async function handleRecord() {
        const i = document.getElementById('card-selector').value;
        const btn = document.getElementById('rec-btn');
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            btn.innerText = "録音";
            btn.style.background = "";
            return;
        }
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const reader = new FileReader();
            reader.onload = (e) => localStorage.setItem(`audio-${i}`, e.target.result);
            reader.readAsDataURL(new Blob(audioChunks));
            alert("録音しました");
        };
        mediaRecorder.start();
        btn.innerText = "停止";
        btn.style.background = "red";
    }

    function changeLayout(n) { currentLayout = n; initBoard(); }
    function toggleMenu() {
        const menu = document.getElementById('menu');
        const body = document.getElementById('body-root');
        menu.style.display = (menu.style.display === 'none') ? 'flex' : 'none';
        body.classList.toggle('hide-menu');
    }
    function resetAll() { if (confirm("初期化しますか？")) { localStorage.clear(); location.reload(); } }
    function exportData() {
        const data = {};
        for (let i = 0; i < 6; i++) {
            data[`img-${i}`] = localStorage.getItem(`img-${i}`);
            data[`label-${i}`] = localStorage.getItem(`label-${i}`);
            data[`audio-${i}`] = localStorage.getItem(`audio-${i}`);
        }
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(data)]));
        a.download = `board-setting.json`;
        a.click();
    }
    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (re) => {
                const data = JSON.parse(re.target.result);
                for (const key in data) { if (data[key]) localStorage.setItem(key, data[key]); }
                initBoard();
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }

    document.addEventListener('keydown', (e) => { if (e.key === 's' || e.key === 'S') toggleMenu(); });
    initBoard();
</script>
</body>
</html>
